<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0b1f3a"/>
      <stop offset="1" stop-color="#1e1b4b"/>
    </linearGradient>
    <radialGradient id="gloss" cx="0.32" cy="0.28" r="0.75">
      <stop stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="0.18" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="1.5" y="1.5" width="61" height="61" rx="16" fill="url(#bg)" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1.5"/>

  <!-- slide trail: faded ghost tiles drifting in from the left -->
  <circle cx="6" cy="22" r="6" fill="#f97316" opacity="0.18"/>
  <circle cx="13" cy="22" r="7.5" fill="#f97316" opacity="0.4"/>

  <!-- top row -->
  <g>
    <circle cx="24" cy="22" r="9" fill="#ef4444"/>
    <circle cx="24" cy="22" r="9" fill="url(#gloss)"/>
  </g>
  <g>
    <circle cx="44" cy="20" r="9" fill="#facc15"/>
    <circle cx="44" cy="20" r="9" fill="url(#gloss)"/>
  </g>

  <!-- bottom row -->
  <g>
    <circle cx="20" cy="42" r="9" fill="#22d3ee"/>
    <circle cx="20" cy="42" r="9" fill="url(#gloss)"/>
  </g>
  <g>
    <circle cx="40" cy="44" r="9" fill="#3b82f6"/>
    <circle cx="40" cy="44" r="9" fill="url(#gloss)"/>
  </g>

  <!-- one tile mid-slide off the right edge -->
  <g>
    <circle cx="57" cy="46" r="7.5" fill="#84cc16"/>
    <circle cx="57" cy="46" r="7.5" fill="url(#gloss)"/>
  </g>
</svg>
